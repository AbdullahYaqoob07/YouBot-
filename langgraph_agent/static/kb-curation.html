<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KB Curation - Sweden Relocators AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .stat-card .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-card .stat-label {
            font-size: 14px;
            color: #666;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }

        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            border-color: #667eea;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            align-self: flex-end;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .questions-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 20px;
        }

        .question-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .question-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
        }

        .question-card.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .question-id {
            font-size: 12px;
            color: #999;
            font-weight: 600;
        }

        .question-badges {
            display: flex;
            gap: 8px;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-reviewed {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-approved {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge-priority-high {
            background: #fecaca;
            color: #991b1b;
        }

        .badge-priority-critical {
            background: #dc2626;
            color: white;
        }

        .question-content {
            margin-bottom: 15px;
        }

        .question-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .question-text {
            background: #f9fafb;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
        }

        .answer-text {
            background: #f0fdf4;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #10b981;
        }

        .question-meta {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }

        .question-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .question-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .metadata-form {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .metadata-form.active {
            display: block;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #667eea;
        }

        .bulk-actions {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
        }

        .bulk-actions.active {
            display: block;
        }

        .bulk-actions-header {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #667eea;
        }

        .bulk-actions-buttons {
            display: flex;
            gap: 10px;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #667eea;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>📚 Knowledge Base Curation</h1>
                <p style="color: #666; font-size: 14px; margin-top: 5px;">Review and approve Q&A pairs for knowledge base</p>
            </div>
            <button class="btn btn-primary" onclick="loadQuestions()">🔄 Refresh</button>
        </div>

        <!-- Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">-</div>
                <div class="stat-label">Total Unanswered</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-reviewed">-</div>
                <div class="stat-label">Reviewed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-approved">-</div>
                <div class="stat-label">Approved</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-added">-</div>
                <div class="stat-label">Added to KB</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label>Status</label>
                <select id="filter-status">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="reviewed" selected>Reviewed</option>
                    <option value="approved">Approved</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Priority</label>
                <select id="filter-priority">
                    <option value="">All</option>
                    <option value="critical">Critical</option>
                    <option value="high">High</option>
                    <option value="normal">Normal</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Language</label>
                <select id="filter-language">
                    <option value="">All</option>
                    <option value="en">English</option>
                    <option value="sv">Swedish</option>
                    <option value="es">Spanish</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Search</label>
                <input type="text" id="filter-search" placeholder="Search questions...">
            </div>
            <button class="btn btn-primary" onclick="loadQuestions()">Apply Filters</button>
        </div>

        <!-- Questions List -->
        <div class="questions-container">
            <div id="questions-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading questions...</p>
                </div>
            </div>
        </div>

        <!-- Bulk Actions Panel -->
        <div class="bulk-actions" id="bulk-actions">
            <div class="bulk-actions-header">
                <span id="selected-count">0</span> items selected
            </div>
            <div class="bulk-actions-buttons">
                <button class="btn btn-success" onclick="bulkApprove()">✓ Approve All</button>
                <button class="btn btn-primary" onclick="bulkAddToKB()">📚 Add to KB</button>
                <button class="btn btn-danger" onclick="bulkReject()">✗ Reject All</button>
                <button class="btn btn-secondary" onclick="clearSelection()">Clear</button>
            </div>
        </div>
    </div>

    <!-- Approval Modal -->
    <div class="modal" id="approve-modal">
        <div class="modal-content">
            <div class="modal-header">Approve for KB Addition</div>
            <form id="approve-form">
                <input type="hidden" id="approve-question-id">
                <div class="form-group">
                    <label>Category *</label>
                    <select id="approve-category" required>
                        <option value="">Select category...</option>
                        <option value="visa">Visa & Immigration</option>
                        <option value="housing">Housing</option>
                        <option value="jobs">Jobs & Employment</option>
                        <option value="education">Education</option>
                        <option value="healthcare">Healthcare</option>
                        <option value="taxation">Taxation</option>
                        <option value="general">General</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tags (comma-separated)</label>
                    <input type="text" id="approve-tags" placeholder="visa, 2026, requirements">
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="approve-priority">
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="approve-notes" rows="3" placeholder="Optional notes..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeApproveModal()">Cancel</button>
                    <button type="submit" class="btn btn-success">✓ Approve</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Quick Add to KB Modal (shown after admin responds) -->
    <div class="modal" id="quick-add-kb-modal">
        <div class="modal-content">
            <div class="modal-header">🎉 Response Submitted!</div>
            <div style="margin-bottom: 20px;">
                <p style="color: #666; margin-bottom: 15px;">Would you like to add this Q&A to the knowledge base?</p>
                <div style="background: #f3f4f6; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <div style="font-size: 14px; color: #374151; margin-bottom: 10px;">
                        <strong>Question:</strong>
                        <div id="quick-add-question" style="margin-top: 5px;"></div>
                    </div>
                    <div style="font-size: 14px; color: #374151;">
                        <strong>Your Response:</strong>
                        <div id="quick-add-answer" style="margin-top: 5px;"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Category (Optional)</label>
                    <select id="quick-add-category">
                        <option value="">Auto-detect</option>
                        <option value="visa">Visa & Immigration</option>
                        <option value="housing">Housing</option>
                        <option value="appointment">Appointment</option>
                        <option value="pricing">Pricing</option>
                        <option value="document">Documents</option>
                        <option value="contact">Contact</option>
                        <option value="general">General</option>
                    </select>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeQuickAddKBModal()">Not Now</button>
                <button type="button" class="btn btn-primary" onclick="quickAddToKB()">📚 Add to KB</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api/v1';
        const ADMIN_API_KEY = 'your_admin_api_key_here';
        const ADMIN_ID = 'admin_01';

        let selectedQuestions = new Set();
        let allQuestions = [];

        // Load questions on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadQuestions();
            loadStats();
        });

        async function loadQuestions() {
            const status = document.getElementById('filter-status').value;
            const priority = document.getElementById('filter-priority').value;
            const language = document.getElementById('filter-language').value;

            const params = new URLSearchParams();
            if (status) params.append('status', status);
            if (priority) params.append('priority', priority);
            if (language) params.append('language', language);
            params.append('limit', '100');

            try {
                const response = await fetch(`${API_BASE_URL}/kb-curation/pending?${params}`, {
                    headers: {
                        'Authorization': `Bearer ${ADMIN_API_KEY}`
                    }
                });

                const data = await response.json();
                
                if (data.success) {
                    allQuestions = data.data.items;
                    renderQuestions(allQuestions);
                } else {
                    showError('Failed to load questions');
                }
            } catch (error) {
                console.error('Error loading questions:', error);
                showError('Network error loading questions');
            }
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE_URL}/kb-curation/stats`, {
                    headers: {
                        'Authorization': `Bearer ${ADMIN_API_KEY}`
                    }
                });

                const data = await response.json();
                
                if (data.success) {
                    const stats = data.data.unanswered_questions;
                    document.getElementById('stat-total').textContent = stats.total;
                    document.getElementById('stat-reviewed').textContent = stats.reviewed;
                    document.getElementById('stat-approved').textContent = stats.approved;
                    document.getElementById('stat-added').textContent = stats.added_to_kb;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function renderQuestions(questions) {
            const container = document.getElementById('questions-list');

            if (questions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>No questions to review</h3>
                        <p>All caught up! Check back later for new questions.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = questions.map(q => `
                <div class="question-card ${selectedQuestions.has(q.id) ? 'selected' : ''}" id="question-${q.id}">
                    <div class="question-header">
                        <div>
                            <input type="checkbox" class="checkbox" 
                                   ${selectedQuestions.has(q.id) ? 'checked' : ''}
                                   onchange="toggleSelection(${q.id})">
                            <span class="question-id">#${q.id}</span>
                        </div>
                        <div class="question-badges">
                            <span class="badge badge-${q.status}">${q.status.toUpperCase()}</span>
                            ${q.priority !== 'normal' ? `<span class="badge badge-priority-${q.priority}">${q.priority.toUpperCase()}</span>` : ''}
                            <span class="badge" style="background: #e5e7eb; color: #374151;">${q.user_language?.toUpperCase()}</span>
                        </div>
                    </div>

                    <div class="question-content">
                        <div class="question-label">❓ User Question:</div>
                        <div class="question-text">${escapeHtml(q.user_question)}</div>

                        ${q.admin_response ? `
                            <div class="question-label">✓ Admin Response:</div>
                            <div class="answer-text">${escapeHtml(q.admin_response)}</div>
                        ` : ''}
                    </div>

                    <div class="question-meta">
                        <span>👤 ${q.user_id}</span>
                        <span>📅 ${new Date(q.created_at).toLocaleDateString()}</span>
                        ${q.unsolved_score ? `<span>📊 Score: ${(q.unsolved_score * 100).toFixed(0)}%</span>` : ''}
                        ${q.category ? `<span>🏷️ ${q.category}</span>` : ''}
                    </div>

                    <div class="question-actions">
                        ${q.status === 'reviewed' ? `
                            <button class="btn btn-success" onclick="openApproveModal(${q.id})">✓ Approve</button>
                            <button class="btn btn-danger" onclick="rejectQuestion(${q.id})">✗ Reject</button>
                        ` : ''}
                        ${q.status === 'approved' ? `
                            <button class="btn btn-primary" onclick="addToKB(${q.id})">📚 Add to KB</button>
                        ` : ''}
                        <button class="btn btn-secondary" onclick="viewDetails(${q.id})">👁️ Details</button>
                    </div>
                </div>
            `).join('');

            updateBulkActionsPanel();
        }

        function toggleSelection(questionId) {
            if (selectedQuestions.has(questionId)) {
                selectedQuestions.delete(questionId);
            } else {
                selectedQuestions.add(questionId);
            }
            updateBulkActionsPanel();
            
            const card = document.getElementById(`question-${questionId}`);
            if (card) {
                card.classList.toggle('selected');
            }
        }

        function updateBulkActionsPanel() {
            const panel = document.getElementById('bulk-actions');
            const count = document.getElementById('selected-count');
            
            if (selectedQuestions.size > 0) {
                panel.classList.add('active');
                count.textContent = selectedQuestions.size;
            } else {
                panel.classList.remove('active');
            }
        }

        function clearSelection() {
            selectedQuestions.clear();
            document.querySelectorAll('.question-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.querySelectorAll('.checkbox').forEach(cb => {
                cb.checked = false;
            });
            updateBulkActionsPanel();
        }

        function openApproveModal(questionId) {
            document.getElementById('approve-question-id').value = questionId;
            document.getElementById('approve-modal').classList.add('active');
        }

        function closeApproveModal() {
            document.getElementById('approve-modal').classList.remove('active');
            document.getElementById('approve-form').reset();
        }

        document.getElementById('approve-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const questionId = document.getElementById('approve-question-id').value;
            const category = document.getElementById('approve-category').value;
            const tags = document.getElementById('approve-tags').value;
            const priority = document.getElementById('approve-priority').value;
            const notes = document.getElementById('approve-notes').value;

            try {
                const response = await fetch(`${API_BASE_URL}/kb-curation/${questionId}/approve`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${ADMIN_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        admin_id: ADMIN_ID,
                        category,
                        tags: tags ? `["${tags.split(',').map(t => t.trim()).join('","')}"]` : null,
                        priority,
                        notes
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    closeApproveModal();
                    loadQuestions();
                    loadStats();
                    showSuccess('Question approved successfully!');
                } else {
                    showError('Failed to approve question');
                }
            } catch (error) {
                console.error('Error approving question:', error);
                showError('Network error');
            }
        });

        async function rejectQuestion(questionId) {
            if (!confirm('Are you sure you want to reject this Q&A pair?')) return;

            const reason = prompt('Reason for rejection (optional):');

            try {
                const response = await fetch(`${API_BASE_URL}/kb-curation/${questionId}/reject`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${ADMIN_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        admin_id: ADMIN_ID,
                        reason
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    loadQuestions();
                    loadStats();
                    showSuccess('Question rejected');
                } else {
                    showError('Failed to reject question');
                }
            } catch (error) {
                console.error('Error rejecting question:', error);
                showError('Network error');
            }
        }

        async function addToKB(questionId) {
            if (!confirm('Add this Q&A to the knowledge base?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/kb-curation/${questionId}/add-to-kb`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${ADMIN_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        admin_id: ADMIN_ID
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    loadQuestions();
                    loadStats();
                    showSuccess(`Added to KB! Document ID: ${data.data.document_id}`);
                } else {
                    showError('Failed to add to KB');
                }
            } catch (error) {
                console.error('Error adding to KB:', error);
                showError('Network error');
            }
        }

        async function bulkApprove() {
            if (selectedQuestions.size === 0) return;
            if (!confirm(`Approve ${selectedQuestions.size} questions?`)) return;

            try {
                const response = await fetch(`${API_BASE_URL}/kb-curation/bulk-approve`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${ADMIN_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        admin_id: ADMIN_ID,
                        question_ids: Array.from(selectedQuestions)
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    clearSelection();
                    loadQuestions();
                    loadStats();
                    showSuccess(`Approved ${data.data.approved} questions`);
                }
            } catch (error) {
                console.error('Error bulk approving:', error);
                showError('Network error');
            }
        }

        async function bulkAddToKB() {
            if (selectedQuestions.size === 0) return;
            if (!confirm(`Add ${selectedQuestions.size} questions to KB?`)) return;

            try {
                const response = await fetch(`${API_BASE_URL}/kb-curation/bulk-add-to-kb`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${ADMIN_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        admin_id: ADMIN_ID,
                        question_ids: Array.from(selectedQuestions)
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    clearSelection();
                    loadQuestions();
                    loadStats();
                    showSuccess(`Added ${data.data.successful} questions to KB`);
                }
            } catch (error) {
                console.error('Error bulk adding to KB:', error);
                showError('Network error');
            }
        }

        async function bulkReject() {
            if (selectedQuestions.size === 0) return;
            if (!confirm(`Reject ${selectedQuestions.size} questions?`)) return;

            // Implement bulk reject
            showError('Bulk reject not yet implemented');
        }

        function viewDetails(questionId) {
            const question = allQuestions.find(q => q.id === questionId);
            if (question) {
                alert(JSON.stringify(question, null, 2));
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showSuccess(message) {
            alert('✓ ' + message);
        }

        function showError(message) {
            alert('✗ ' + message);
        }

        // Quick Add to KB Modal Functions
        let quickAddQuestionId = null;

        function showQuickAddKBModal(questionId, questionText, answerText) {
            quickAddQuestionId = questionId;
            document.getElementById('quick-add-question').textContent = questionText;
            document.getElementById('quick-add-answer').textContent = answerText;
            document.getElementById('quick-add-kb-modal').classList.add('active');
        }

        function closeQuickAddKBModal() {
            document.getElementById('quick-add-kb-modal').classList.remove('active');
            document.getElementById('quick-add-category').value = '';
            quickAddQuestionId = null;
        }

        async function quickAddToKB() {
            if (!quickAddQuestionId) return;

            const category = document.getElementById('quick-add-category').value;

            try {
                // First approve the question
                const approveResponse = await fetch(`${API_BASE_URL}/kb-curation/${quickAddQuestionId}/approve`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${ADMIN_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        admin_id: ADMIN_ID,
                        category: category || null,
                        notes: 'Quick add to KB'
                    })
                });

                if (!approveResponse.ok) {
                    showError('Failed to approve question');
                    return;
                }

                // Then add to KB
                const addResponse = await fetch(`${API_BASE_URL}/kb-curation/${quickAddQuestionId}/add-to-kb`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${ADMIN_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        admin_id: ADMIN_ID
                    })
                });

                const addData = await addResponse.json();

                if (addData.success) {
                    closeQuickAddKBModal();
                    loadQuestions();
                    loadStats();
                    showSuccess(`✅ Added to knowledge base! FAQ ID: ${addData.faq_id || 'N/A'}`);
                } else {
                    showError('Failed to add to KB');
                }
            } catch (error) {
                console.error('Error in quick add to KB:', error);
                showError('Network error');
            }
        }

        // Function to be called from admin response form (in admin dashboard)
        // Add this to your admin_dashboard.html or wherever admin responds to questions
        window.onAdminResponseSubmitted = function(questionId, questionText, responseText) {
            // Show the quick add modal
            showQuickAddKBModal(questionId, questionText, responseText);
        };
    </script>
